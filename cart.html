<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Кошик | Beauty Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <div class="logo">Beauty Store</div>
    <ul class="menu">
        <li><a href="index.html">Головна</a></li>
        <li><a href="catalog.html">Каталог</a></li>
        <li><a href="sale.html">Акції</a></li>
        <li><a href="contact.html">Контакти</a></li>
        <li><a href="cart.html">🛒 Кошик</a></li>
    </ul>
</nav>

<section class="page-header" style="text-align: center; padding: 30px 0 10px;">
    <h1>Ваш кошик</h1>
</section>

<section id="cart-items" style="max-width: 800px; margin: 0 auto; padding: 0 20px;"></section>

<div style="text-align: center; margin-top: 30px;">
    <h2 id="total">Загальна сума: 0 грн</h2>
    <button onclick="goToCheckout()" class="checkout-btn" style="margin-top: 15px;">
        Оформити замовлення
    </button>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function renderCart(){
    let container = document.getElementById("cart-items");
    let total = 0;
    container.innerHTML = "";

    cart.forEach((item, index) => {
        total += item.price;

        // Створюємо елемент рядка з флексбокс-вирівнюванням
        container.innerHTML += `
            <div class="cart-item" style="display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid #eee; background: #fff; margin-bottom: 5px;">
                <div style="display: flex; align-items: center; width: 70%; gap: 30px;">
                    <h3 style="font-size: 16px; margin: 0; font-weight: 600; min-width: 250px;">${item.name}</h3>
                    <p style="margin: 0; color: #e75480; font-weight: 700; font-size: 16px;">${item.price} грн</p>
                </div>
                <button onclick="removeItem(${index})" style="background-color: #e74c3c; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: 600;">
                    Видалити
                </button>
            </div>
        `;
    });

    document.getElementById("total").innerText = "Загальна сума: " + total + " грн";
    
    // Перевіряємо, чи існує на сторінці елемент cart-count перед тим як записувати туди дані
    let cartCount = document.getElementById("cart-count");
    if(cartCount) {
        cartCount.innerText = cart.length;
    }
}

function removeItem(index){
    cart.splice(index,1);
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
}

renderCart();

function goToCheckout(){
    if(cart.length === 0){
        alert("Кошик порожній!");
        return;
    }
    window.location.href = "checkout.html";
}
</script>

</body>
</html>
